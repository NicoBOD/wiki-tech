site_name: Wiki Tech — NicoBOD
site_url: https://wiki.bodaine.fr/
site_description: Wiki technique personnel — systèmes, réseaux, cloud, cybersécurité, IA, automatisation
edit_uri: https://github.com/NicoBOD/wiki-tech/edit/main/docs/

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.path
    - navigation.indexes
    - navigation.expand
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.action.edit
    - content.action.view
    - toc.follow

plugins:
  - search:
      lang: fr
      separator: '[\s\-,:!=\[\]()"/]+|(?<!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - tags:
      tags_file: tags.md

nav:
  - Accueil: index.md
  - Systèmes:
    - systemes/index.md
    - virt-sysprep — préparer une image Linux au clonage: systemes/virt-sysprep-preparer-image-linux-clonage.md
  - Réseaux: reseaux/index.md
  - Cloud: cloud/index.md
  - Cybersécurité: cybersecurite/index.md
  - IA: ia/index.md
  - Automatisation:
    - automatisation/index.md
    - Les bases de n8n: automatisation/bases-n8n.md
  - Logiciels: logiciels/index.md
  - Debug:
    - debug/index.md
    - NVIDIA — Écran noir après veille: debug/nvidia-veille-ecran-noir.md
  - Astuces: astuces/index.md
  - Tags: tags.md

copyright: >
  <a href="mentions-legales/">Mentions légales</a>

extra:
  generator: false
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/bodaine
      name: Nicolas BODAINE sur LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/NicoBOD
      name: NicoBOD sur GitHub
    - icon: fontawesome/solid/globe
      link: https://nicolas.bodaine.fr
      name: Portfolio de Nicolas BODAINE

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  # Python Markdown Extensions
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
