site_name: Wiki Tech — NicoBOD
site_url: https://wiki.bodaine.fr/
site_description: Wiki technique personnel — systèmes, réseaux, cloud, cybersécurité, IA, automatisation
repo_url: https://github.com/NicoBOD/wiki-tech
repo_name: NicoBOD/wiki-tech
edit_uri: edit/main/docs/

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search:
      lang: fr

nav:
  - Accueil: index.md
  - Systèmes: systemes/index.md
  - Réseaux: reseaux/index.md
  - Cloud: cloud/index.md
  - Cybersécurité: cybersecurite/index.md
  - IA: ia/index.md
  - Automatisation: automatisation/index.md
  - Logiciels: logiciels/index.md
  - Debug: debug/index.md
  - Astuces: astuces/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
