site_name: Wiki Tech — NicoBOD
site_url: https://wiki.bodaine.fr/
site_description: Wiki technique personnel — systèmes, réseaux, cloud, cybersécurité, IA, automatisation
edit_uri: https://github.com/NicoBOD/wiki-tech/edit/main/docs/

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
    - content.action.view

plugins:
  - search:
      lang: fr
  - tags:
      tags_file: tags.md

nav:
  - Accueil: index.md
  - Systèmes: systemes/index.md
  - Réseaux: reseaux/index.md
  - Cloud: cloud/index.md
  - Cybersécurité: cybersecurite/index.md
  - IA: ia/index.md
  - Automatisation: automatisation/index.md
  - Logiciels: logiciels/index.md
  - Debug:
    - debug/index.md
    - NVIDIA — Écran noir après veille: debug/nvidia-veille-ecran-noir.md
  - Astuces: astuces/index.md
  - Tags: tags.md

copyright: >
  <a href="mentions-legales/">Mentions légales</a>

extra:
  generator: false
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/bodaine
      name: Nicolas BODAINE sur LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/NicoBOD
      name: NicoBOD sur GitHub
    - icon: fontawesome/solid/globe
      link: https://nicolas.bodaine.fr
      name: Portfolio de Nicolas BODAINE

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
